<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>stage</title>
<link rel="stylesheet" href="test-que.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#06bf0d">
</head>
<body>
<div class="gummy-rain"></div>
<div class="top-bar">
  <img src="pic/retry.png" alt="やり直す" id="retryBtn">
  <img src="pic/stop.png" alt="やめる" id="quitBtn">
</div>
<div class="question">
  <div id="jpWord"></div>
  <div id="answerReveal"></div>
  <!-- input → div に変更 -->
  <div id="answer"></div>
</div>
<button id="assistBtn" onclick="useAssist()">ヒント</button>
<div class="progress">
  <div id="progressBar"></div>
</div>
<div class="keyboard" id="keyboard">
  <div class="key-row">
    <img src="../CHO122211/pic/key/q.png" onclick="add('q')">
    <img src="../CHO122211/pic/key/w.png" onclick="add('w')">
    <img src="../CHO122211/pic/key/e.png" onclick="add('e')">
    <img src="../CHO122211/pic/key/r.png" onclick="add('r')">
    <img src="../CHO122211/pic/key/t.png" onclick="add('t')">
    <img src="../CHO122211/pic/key/y.png" onclick="add('y')">
    <img src="../CHO122211/pic/key/u.png" onclick="add('u')">
    <img src="../CHO122211/pic/key/i.png" onclick="add('i')">
    <img src="../CHO122211/pic/key/o.png" onclick="add('o')">
    <img src="../CHO122211/pic/key/p.png" onclick="add('p')">
  </div>
  <div class="key-row">
    <img src="../CHO122211/pic/key/a.png" onclick="add('a')">
    <img src="../CHO122211/pic/key/s.png" onclick="add('s')">
    <img src="../CHO122211/pic/key/d.png" onclick="add('d')">
    <img src="../CHO122211/pic/key/f.png" onclick="add('f')">
    <img src="../CHO122211/pic/key/g.png" onclick="add('g')">
    <img src="../CHO122211/pic/key/h.png" onclick="add('h')">
    <img src="../CHO122211/pic/key/j.png" onclick="add('j')">
    <img src="../CHO122211/pic/key/k.png" onclick="add('k')">
    <img src="../CHO122211/pic/key/l.png" onclick="add('l')">
  </div>
  <div class="key-row key-row-letters">
    <img src="../CHO122211/pic/key/z.png" onclick="add('z')">
    <img src="../CHO122211/pic/key/x.png" onclick="add('x')">
    <img src="../CHO122211/pic/key/c.png" onclick="add('c')">
    <img src="../CHO122211/pic/key/v.png" onclick="add('v')">
    <img src="../CHO122211/pic/key/b.png" onclick="add('b')">
    <img src="../CHO122211/pic/key/n.png" onclick="add('n')">
    <img src="../CHO122211/pic/key/m.png" onclick="add('m')">
    <img src="../CHO122211/pic/key/-.png" onclick="add('-')">
  </div>
  <div class="key-row key-row-actions">
    <img src="../CHO122211/pic/key/delete.png" onclick="del()">
    <img src="../CHO122211/pic/key/ansewer.png" onclick="check()">
  </div>
</div>
<div class="next-area" id="stageEndArea">
  <img id="nextStageBtn" src="pic/next.png" alt="次へ">
    <a href="test-ser.html"> 
    <img class="back-btn" src="pic/back.png" alt="戻る">
    </a>
</div>
<div id="judge">
  <img id="correct" src="pic/poo.png">
  <img id="wrong" src="pic/buu.png">
</div>
<script src="./test-quemo.js"></script>
<script src="./test-que.js"></script>
</body>
</html>
