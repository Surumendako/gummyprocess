<!DOCTYPE html>
<html lang="ja">
<head>

  <!-- 進捗 -->
  <div class="progress-wrap">

  <!-- カード -->

    <div class="card" id="card">
      <div class="word-jp" id="wordJp"></div>
      <div class="divider"></div>
      <div class="word-en" id="wordEn"></div>
    </div>
  </div>

  <!-- ナビ -->
  <div class="nav-area">
    <button class="nav-btn" id="prevBtn">◀</button>
